target-version = "py311"
line-length = 120

[lint]
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort
  "UP",    # pyupgrade
  "B",     # flake8-bugbear
  "SIM",   # flake8-simplify
  "RUF",   # ruff-specific
]
ignore = [
  "E501",  # line too long (handled by formatter)
  "B008",  # do not perform function calls in argument defaults (FastAPI Depends)
  "RUF012", # mutable class variables (SQLAlchemy models)
  "SIM108", # ternary operator — often less readable than if/else
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
