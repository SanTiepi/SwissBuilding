  - id: W86-A
    outcome: Header dropdown keyboard a11y fixes (Escape close + menu semantics).
    files:
      modify:
        - frontend/src/components/Header.tsx
        - frontend/src/components/__tests__/Header.test.tsx
        - frontend/e2e/navigation.spec.ts
      create: []
      do_not_touch:
        - frontend/src/i18n/en.ts
        - frontend/src/i18n/fr.ts
        - frontend/src/i18n/de.ts
        - frontend/src/i18n/it.ts
    constraints:
      - Preserve existing visual behavior.
      - Keep keyboard + touch usability.
      - validate-fix-rerun loop mandatory before handoff.
    validate:
      - cd frontend && npm run validate
      - cd frontend && npm test -- Header
      - cd frontend && npm run test:e2e -- navigation.spec.ts
    exit: Dropdowns close on Escape and remain keyboard navigable.

