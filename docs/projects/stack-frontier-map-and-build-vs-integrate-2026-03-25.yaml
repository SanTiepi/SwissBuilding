as_of: 2026-03-25

decision_rule:
  summary: >
    Build only if the proposal increases at least two of the following:
    cumulative dossier value, procedural clarity, evidence reuse,
    useful multi-actor dependency.
  dimensions:
    - cumulative_dossier_value
    - procedural_clarity
    - evidence_reuse
    - useful_multi_actor_dependency

core_now:
  - canonical_building_workspace
  - control_tower_operating_inbox
  - obligations_and_deadlines
  - procedure_engine
  - proof_and_delivery_layer
  - swissrules_spine
  - passport_and_exchange_contract

next_moat:
  - portfolio_intelligence_grounded_in_proof
  - contributor_quality_and_partner_trust
  - geometry_and_openbim_intelligence
  - benchmarking_and_learning_loops
  - material_and_circularity_intelligence

future_infrastructure:
  - passport_exchange_network
  - authority_flow
  - trust_vault_and_chain_of_custody
  - territory_and_public_system_coordination
  - agent_operating_layer

integrate_instead_of_build:
