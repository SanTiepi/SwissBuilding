title: "SwissBuilding - European-model, Swiss-launch market strategy"
date: "2026-03-08"
audience: "Claude Code, Codex, product lead"
language: "fr-CH / en"
sources:
  official:
    bfs:
      - "https://www.bfs.admin.ch/bfs/en/home/registers/buildings-dwellings.html"
      - "https://dam-api.bfs.admin.ch/hub/api/dam/assets/32329330/master"
    bfe:
      - "https://www.bfe.admin.ch/bfe/en/home/efficiency/buildings.html"
    bafu:
      - "https://www.bafu.admin.ch/en/funding-in-the-building-sector"
