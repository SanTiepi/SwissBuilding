# version removed (obsolete in modern Docker Compose)

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: swissbuildingos-postgres
    restart: always
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: swissbuildingos-minio
    restart: always
    command: server /data --console-address ":9001"
    expose:
      - "9000"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: swissbuildingos-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: swissbuildingos-gotenberg
    restart: always
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: swissbuildingos-meilisearch
    restart: always
    expose:
      - "7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  clamav:
    image: clamav/clamav:stable
    container_name: swissbuildingos-clamav
    restart: always
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: swissbuildingos-backend
    restart: always
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      REDIS_URL: ${REDIS_URL}
      MEILISEARCH_URL: ${MEILISEARCH_URL}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      GOTENBERG_URL: http://gotenberg:3000
      CLAMAV_HOST: clamav
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: swissbuildingos-frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: swissbuildingos-caddy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:
  redis_data:
  meilisearch_data:
  clamav_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
