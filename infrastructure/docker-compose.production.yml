# SwissBuilding / BatiConnect — Production Docker Compose
# Deployed on: VPS 83.228.221.188
# Domain: app.swissbuilding.ch (routed via Batiscan's Caddy on ports 80/443)
# Storage: Infomaniak S3 (swissbuilding-uploads, swissbuilding-reports, swissbuilding-backups)
# Database: own PostgreSQL instance, NOT shared with Batiscan V4
# Bridge: read-only DiagnosticPublicationPackage from Batiscan V4 (HTTP, no DB link)
#
# NOTE: No Caddy in this compose — the Batiscan Caddy (ports 80/443) routes
# app.swissbuilding.ch to this stack. Caddy must join the swissbuilding network.

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: swissbuilding-postgres
    restart: always
    expose:
      - "5432"
    volumes:
      - /mnt/data/swissbuilding/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swissbuildingos}
      POSTGRES_USER: ${POSTGRES_USER:-swissbuildingos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swissbuildingos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissbuilding

  redis:
    image: redis:7-alpine
    container_name: swissbuilding-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissbuilding

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: swissbuilding-backend
    restart: always
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
      # Infomaniak S3 — own buckets, NOT shared with Batiscan
      S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT required}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY required}
      S3_BUCKET: ${S3_BUCKET:-swissbuilding-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      REDIS_URL: redis://redis:6379/0
      # Bridge — read-only connection to Batiscan V4
      BATISCAN_API_URL: ${BATISCAN_API_URL:-}
      BATISCAN_API_KEY: ${BATISCAN_API_KEY:-}
      # AI provider (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - swissbuilding
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: swissbuilding-frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - swissbuilding

volumes:
  redis_data:

networks:
  swissbuilding:
    name: swissbuilding
    driver: bridge
