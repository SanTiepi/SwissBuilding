version: "3.9"

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: swissbuildingos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swissbuildingos}
      POSTGRES_USER: ${POSTGRES_USER:-swissbuildingos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swissbuildingos_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swissbuildingos} -d ${POSTGRES_DB:-swissbuildingos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - swissbuilding-net

  minio:
    image: minio/minio:latest
    container_name: swissbuildingos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - swissbuilding-net

  redis:
    image: redis:7-alpine
    container_name: swissbuildingos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissbuilding-net

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: swissbuildingos-gotenberg
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissbuilding-net

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: swissbuildingos-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-dev-meili-key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissbuilding-net

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: swissbuildingos-glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swissbuildingos}:${POSTGRES_PASSWORD:-swissbuildingos_dev_2024}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-dev-glitchtip-secret-change-in-production}
      PORT: "8080"
      GLITCHTIP_DOMAIN: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swissbuilding-net

  clamav:
    image: clamav/clamav:1.2
    container_name: swissbuildingos-clamav
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - swissbuilding-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: swissbuildingos-backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swissbuilding-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: swissbuildingos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - swissbuilding-net

  nginx:
    image: nginx:alpine
    container_name: swissbuildingos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - swissbuilding-net

networks:
  swissbuilding-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  clamav_data:
    driver: local
